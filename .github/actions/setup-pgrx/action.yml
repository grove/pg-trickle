name: Setup pgrx build environment
description: >
  Install Rust toolchain, cargo-pgrx 0.17.0, and PostgreSQL 18 build support.
  Works on Linux, macOS, and Windows runners with either system-managed or
  pgrx-managed PostgreSQL.

inputs:
  rust-toolchain:
    description: Rust toolchain version
    default: stable
  pg-version:
    description: PostgreSQL major version
    default: "18"
  pg-install-mode:
    description: PostgreSQL provisioning mode for pgrx (`system` or `download`)
    default: system

runs:
  using: composite
  steps:
    # ── Rust toolchain ────────────────────────────────────────────────────
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: clippy, rustfmt

    # ── Caching ───────────────────────────────────────────────────────────
    # Note: Swatinem/rust-cache@v2 is NOT used here because it references
    # the 'matrix' context internally, which is unavailable in composite
    # actions and causes GitHub Actions workflow validation to fail.
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: v1-cargo-registry-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          v1-cargo-registry-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-
          v1-cargo-registry-${{ runner.os }}-

    - name: Cache cargo build artifacts
      uses: actions/cache@v4
      with:
        path: target
        key: v1-cargo-build-pgrx0.17-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          v1-cargo-build-pgrx0.17-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-
          v1-cargo-build-pgrx0.17-${{ runner.os }}-

    - name: Cache cargo-pgrx binary
      id: cache-cargo-pgrx
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/cargo-pgrx
          ~/.cargo/bin/cargo-pgrx.exe
          ~/.cargo/.crates2.json
          ~/.cargo/.crates.toml
        key: v2-cargo-pgrx-bin-0.17.0-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}

    - name: Cache pgrx home directory (~/.pgrx)
      id: cache-pgrx-home
      uses: actions/cache@v4
      with:
        path: ~/.pgrx
        key: pgrx-home-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-pg${{ inputs.pg-version }}-${{ inputs.pg-install-mode }}-pgrx0.17.0

    # ── PostgreSQL headers (Linux) ────────────────────────────────────────
    - name: Install PostgreSQL ${{ inputs.pg-version }} (Linux)
      if: runner.os == 'Linux' && inputs.pg-install-mode == 'system'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq curl ca-certificates gnupg lsb-release >/dev/null

        # Add PGDG repository
        sudo install -d /usr/share/postgresql-common/pgdg
        sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
          --fail -sS https://www.postgresql.org/media/keys/ACCC4CF8.asc
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
          https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
          | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null

        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          postgresql-${{ inputs.pg-version }} \
          postgresql-server-dev-${{ inputs.pg-version }} >/dev/null

        # Make pg_config available on PATH
        echo "/usr/lib/postgresql/${{ inputs.pg-version }}/bin" >> "$GITHUB_PATH"

    - name: Install PostgreSQL source build dependencies (Linux)
      if: runner.os == 'Linux' && inputs.pg-install-mode == 'download'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          bison \
          flex \
          libreadline-dev \
          zlib1g-dev >/dev/null

    # ── PostgreSQL headers (macOS) ────────────────────────────────────────
    - name: Install PostgreSQL ${{ inputs.pg-version }} (macOS)
      if: runner.os == 'macOS' && inputs.pg-install-mode == 'system'
      shell: bash
      run: |
        brew install --quiet postgresql@${{ inputs.pg-version }} || true
        PG_PREFIX="$(brew --prefix postgresql@${{ inputs.pg-version }})"
        echo "${PG_PREFIX}/bin" >> "$GITHUB_PATH"

    # ── PostgreSQL headers (Windows) ──────────────────────────────────────
    # Windows: no system pg_config needed — pgrx init uses 'download' mode
    # which compiles PostgreSQL from source inside ~/.pgrx (cached above).

    # ── cargo-pgrx ────────────────────────────────────────────────────────
    - name: Ensure cargo-pgrx is available
      shell: bash
      run: |
        if command -v cargo-pgrx >/dev/null 2>&1; then
          cargo pgrx --version
          exit 0
        fi

        cargo install --locked cargo-pgrx --version 0.17.0
        cargo pgrx --version

    # ── pgrx init ─────────────────────────────────────────────────────────
    - name: Initialize pgrx for PostgreSQL ${{ inputs.pg-version }}
      if: steps.cache-pgrx-home.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ] || [ "${{ inputs.pg-install-mode }}" = "download" ]; then
          # Windows and download mode use a pgrx-managed PostgreSQL install.
          cargo pgrx init --pg${{ inputs.pg-version }} download
        else
          PG_CONFIG_PATH="$(which pg_config 2>/dev/null || echo pg_config)"
          echo "Using pg_config at: ${PG_CONFIG_PATH}"
          "${PG_CONFIG_PATH}" --version
          cargo pgrx init --pg${{ inputs.pg-version }} "${PG_CONFIG_PATH}"
        fi

    - name: Add configured PostgreSQL binaries to PATH
      shell: bash
      run: |
        PGRX_PREFIX="$(cargo pgrx info path pg${{ inputs.pg-version }})"
        echo "${PGRX_PREFIX}/bin" >> "$GITHUB_PATH"

    - name: Verify pgrx environment
      shell: bash
      run: cargo pgrx info path pg${{ inputs.pg-version }}
