# =============================================================================
# Unsafe Inventory Workflow — surface unsafe block growth in PRs.
#
# Counts `unsafe {` blocks per .rs file and compares against the committed
# baseline in .unsafe-baseline.
#
# Trigger behaviour:
#   pull_request / push to main — informational only: regressions appear in
#       the step summary (⚠️) but the job always exits 0 so it never blocks
#       a PR merge or a main-branch push.
#   schedule (nightly / full E2E matrix) — strict: exits 1 when any file
#       exceeds its baseline so regressions cannot silently accumulate.
#   workflow_dispatch — informational (same as push/PR).
#
# To update the baseline after a justified unsafe addition:
#   scripts/unsafe_inventory.sh --update > .unsafe-baseline
#   git add .unsafe-baseline && git commit -m "chore: update unsafe baseline"
# =============================================================================
name: Unsafe inventory

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.unsafe-baseline'
      - 'scripts/unsafe_inventory.sh'
      - '.github/workflows/unsafe-inventory.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.unsafe-baseline'
      - 'scripts/unsafe_inventory.sh'
      - '.github/workflows/unsafe-inventory.yml'
  schedule:
    - cron: '15 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unsafe-inventory:
    name: Unsafe block inventory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run unsafe inventory
        run: |
          chmod +x scripts/unsafe_inventory.sh
          # On PRs and direct pushes the inventory is informational only —
          # regressions are surfaced in the step summary but do NOT block merge.
          # On scheduled runs (nightly / full E2E matrix) the check is strict
          # and will fail the build so regressions cannot accumulate unnoticed.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            scripts/unsafe_inventory.sh
          else
            scripts/unsafe_inventory.sh --report-only
          fi
