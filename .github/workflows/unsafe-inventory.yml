# =============================================================================
# Unsafe Inventory Workflow — surface unsafe block growth in PRs.
#
# Counts `unsafe {` blocks per .rs file and compares against the committed
# baseline in .unsafe-baseline.
#
# Trigger behaviour (all triggers):
#   Informational only — regressions appear in the step summary (⚠️) but the
#   job always exits 0 and never blocks any build or PR merge.
#   Tighten to strict (remove --report-only) once the team adopts the policy.
#
# To update the baseline after a justified unsafe addition:
#   scripts/unsafe_inventory.sh --update > .unsafe-baseline
#   git add .unsafe-baseline && git commit -m "chore: update unsafe baseline"
# =============================================================================
name: Unsafe inventory

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.unsafe-baseline'
      - 'scripts/unsafe_inventory.sh'
      - '.github/workflows/unsafe-inventory.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.unsafe-baseline'
      - 'scripts/unsafe_inventory.sh'
      - '.github/workflows/unsafe-inventory.yml'
  schedule:
    - cron: '15 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unsafe-inventory:
    name: Unsafe block inventory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run unsafe inventory
        run: |
          chmod +x scripts/unsafe_inventory.sh
          # Informational only for now — regressions surface in the step summary
          # but never fail the build. Remove --report-only to enforce strictly.
          scripts/unsafe_inventory.sh --report-only
