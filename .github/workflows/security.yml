# =============================================================================
# Security Audit — free for public repositories.
#
# Runs cargo-audit to check all Cargo dependencies against the RustSec
# Advisory Database (https://rustsec.org/) for known CVEs.
#
# Results are posted as PR check annotations via rustsec/audit-check.
#
# Runs on: pushes to main that touch dependencies, every PR, and weekly.
# =============================================================================
name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    # Weekly on Monday at 08:00 UTC — catches newly published advisories
    - cron: "0 8 * * 1"
  workflow_dispatch:  # Allow manual runs from the Actions tab

jobs:
  audit:
    if: github.event_name != 'schedule'
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # rustsec/audit-check posts results as a GitHub Check Run
    steps:
      - uses: actions/checkout@v5

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa Marvin Attack — pulled in transitively via
          # sqlx -> sqlx-mysql -> rsa, but pg_trickle only uses the "postgres"
          # feature of sqlx. sqlx-mysql is never compiled into the extension.
          # Suppress until an upstream fix is available.
          # RUSTSEC-2026-0104: rustls-webpki reachable panic in CRL parsing.
          # Pulled in transitively via ureq (dev/test path). We do not parse CRLs.
          # Will be resolved when upstream updates to >=0.103.13.
          # RUSTSEC-2026-0098, RUSTSEC-2026-0099: rustls-webpki name-constraint bugs.
          # Pulled in via aws-smithy-http-client (optional sqs feature of pgtrickle-relay).
          # Not reachable in relay code. Will resolve when AWS SDK migrates to rustls 0.23.x.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0104,RUSTSEC-2026-0098,RUSTSEC-2026-0099

  scheduled_audit:
    if: github.event_name == 'schedule'
    name: cargo audit (scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write  # scheduled rustsec/audit-check runs open issues for new advisories
    steps:
      - uses: actions/checkout@v5

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa Marvin Attack — pulled in transitively via
          # sqlx -> sqlx-mysql -> rsa, but pg_trickle only uses the "postgres"
          # feature of sqlx. sqlx-mysql is never compiled into the extension.
          # Suppress until an upstream fix is available.
          # RUSTSEC-2026-0104: rustls-webpki reachable panic in CRL parsing.
          # Pulled in transitively via ureq (dev/test path). We do not parse CRLs.
          # Will be resolved when upstream updates to >=0.103.13.
          # RUSTSEC-2026-0098, RUSTSEC-2026-0099: rustls-webpki name-constraint bugs.
          # Pulled in via aws-smithy-http-client (optional sqs feature of pgtrickle-relay).
          # Not reachable in relay code. Will resolve when AWS SDK migrates to rustls 0.23.x.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0104,RUSTSEC-2026-0098,RUSTSEC-2026-0099
