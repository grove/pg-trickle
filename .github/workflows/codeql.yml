# =============================================================================
# CodeQL Workflow — static analysis for Rust extension code
#
# Uses build-mode: none (the only mode supported for Rust) so CodeQL analyses
# the source directly. This complements clippy by looking for higher-level
# security and dataflow issues.
# =============================================================================
name: CodeQL

on:
  # No push or pull_request trigger: CodeQL output goes to the Security tab
  # only (never inline PR annotations), so running it on every push/PR adds
  # ~25 min of CI cost with no faster feedback. Weekly schedule is enough.
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  PG_VERSION: '18'

jobs:
  analyze:
    name: CodeQL (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
