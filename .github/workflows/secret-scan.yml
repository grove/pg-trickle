name: Secret scanning

# O40-9: Detect accidentally committed credentials and tokens in examples,
# configuration files, and operator-facing documentation.
#
# Uses gitleaks to scan for high-confidence patterns (API keys, passwords,
# connection strings, private keys, etc.) in the repository.
#
# The scan is:
#   - Incremental on pull_requests: only scans changed files.
#   - Full on main pushes and weekly schedule to catch historical additions.
#
# Gitleaks configuration: .gitleaks.toml (at repo root) — customize allowlist
# rules for false positives (e.g., example connection strings in docs).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks (full scan on push/schedule, diff scan on PRs)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gitleaks detect \
              --source . \
              --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --config .gitleaks.toml \
              --redact \
              --exit-code 1
          else
            gitleaks detect \
              --source . \
              --config .gitleaks.toml \
              --redact \
              --exit-code 1
          fi
