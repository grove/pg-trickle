# =============================================================================
# CI Workflow — Run the full test matrix
#
# Automatic triggers (with path filters on Rust/test files):
#   push/PR → main : unit (Linux) + integration tests (~15 min gate)
#   push → main    : + light E2E tests, + coverage upload
#   Weekly (Mon)   : full unit matrix (Linux + macOS), E2E, dbt, CNPG smoke
#   Manual         : all jobs, all platforms (including Windows + benchmarks)
# =============================================================================
name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'sql/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'sql/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
  schedule:
    - cron: '0 3 * * *'  # Daily 03:00 UTC — full matrix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NEXTEST_PROFILE: ci
  PG_VERSION: "18"

jobs:
  # ── Unit tests (Linux PR gate) ──────────────────────────────────────────
  unit-tests:
    name: Unit tests (PR gate, linux-amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Run unit tests
        run: ./scripts/run_unit_tests.sh pg18
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'target/nextest/ci/junit.xml'
          commit: ${{github.event.pull_request.head.sha}}

  # ── Unit tests (extra platforms) ───────────────────────────────────────
  # Keep macOS/Windows coverage off the PR path; Linux remains the merge gate
  # while the wider platform matrix runs on schedule or manual dispatch.
  unit-tests-macos:
    name: Unit tests (scheduled/manual, macos-arm64)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Run unit tests
        run: ./scripts/run_unit_tests.sh pg18
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'target/nextest/ci/junit.xml'
          commit: ${{github.event.pull_request.head.sha}}

  unit-tests-windows:
    name: Unit tests (scheduled/manual, windows-amd64)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Compile-check unit tests (Windows)
        run: cargo test --lib --features pg18 --no-run

  # ── Integration tests (testcontainers, Linux only) ──────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Restore Docker image cache (postgres:18.3-alpine)
        uses: actions/cache@v5
        id: cache-docker-postgres-alpine
        with:
          path: /tmp/docker-images/postgres-18.3-alpine.tar
          key: docker-postgres-18.3-alpine

      - name: Load or pull postgres:18.3-alpine
        run: |
          if [ -f /tmp/docker-images/postgres-18.3-alpine.tar ]; then
            docker load --input /tmp/docker-images/postgres-18.3-alpine.tar
          else
            docker pull postgres:18.3-alpine
            mkdir -p /tmp/docker-images
            docker save postgres:18.3-alpine --output /tmp/docker-images/postgres-18.3-alpine.tar
          fi

      - name: Run integration tests
        run: |
          cargo nextest run \
            --profile ci \
            --test catalog_tests \
            --test extension_tests \
            --test monitoring_tests \
            --test smoke_tests \
            --test resilience_tests \
            --test scenario_tests \
            --test workflow_tests \
            --test property_tests
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'target/nextest/ci/junit.xml'
          commit: ${{github.event.pull_request.head.sha}}

  # ── Light-E2E tests (stock postgres container, PR-friendly) ──────────────
  # Uses `cargo pgrx package` + bind-mount into a stock postgres:18.3
  # container. No custom Docker image build needed. The curated allowlist
  # lives in scripts/run_light_e2e_tests.sh and is split across three shards
  # to reduce PR wall-clock time.
  light-e2e-tests:
    name: Light E2E tests (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 1
            shard_count: 3
            shard_name: 1/3
          - shard_index: 2
            shard_count: 3
            shard_name: 2/3
          - shard_index: 3
            shard_count: 3
            shard_name: 3/3
    steps:
      - name: Free up disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Pull postgres:18.3 image
        run: docker pull postgres:18.3

      - name: Run light-E2E test suite
        run: |
          bash ./scripts/run_light_e2e_tests.sh \
            --package \
            --shard-index ${{ matrix.shard_index }} \
            --shard-count ${{ matrix.shard_count }}

  # ── E2E tests (full extension in Docker, Linux only) ────────────────────
  # Skipped on PRs (takes ~20 min to build the Docker image). Runs on
  # schedule and manual dispatch only (not push-to-main — too slow).
  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    steps:
      - name: Free up disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af
          df -h

      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Restore Docker image cache (postgres:18.3)
        uses: actions/cache@v5
        id: cache-docker-postgres-e2e
        with:
          path: /tmp/docker-images/postgres-18.3.tar
          key: docker-postgres-18.3

      - name: Load or pull postgres:18.3
        run: |
          if [ -f /tmp/docker-images/postgres-18.3.tar ]; then
            docker load --input /tmp/docker-images/postgres-18.3.tar
          else
            docker pull postgres:18.3
            mkdir -p /tmp/docker-images
            docker save postgres:18.3 --output /tmp/docker-images/postgres-18.3.tar
          fi

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Run E2E test suite
        run: cargo nextest run --profile ci --test 'e2e_*'

      - name: Run Phase 9 correctness gate (TPC-H-derived, DIFFERENTIAL mode)
        # Five curated TPC-H queries in DIFFERENTIAL mode — zero-tolerance gate.
        # Included in the e2e_* sweep above; run again explicitly for visibility.
        run: |
          cargo nextest run --profile ci --test e2e_correctness_gate_tests --no-capture

      - name: Run TPC-H-derived correctness tests
        run: |
          cargo nextest run --profile ci --test e2e_tpch_tests --run-ignored all

      - name: Run E2E tests with sequential refresh mode
        env:
          PGT_PARALLEL_MODE: "off"
        run: |
          cargo nextest run --profile ci --test 'e2e_*'
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'target/nextest/ci/junit.xml'
          commit: ${{github.event.pull_request.head.sha}}

  # ── Upgrade completeness check (every PR) ───────────────────────────────
  # Lightweight: validates that the upgrade SQL script covers all objects
  # in the pgrx-generated full install script. No Docker needed.
  upgrade-check:
    name: Upgrade completeness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Check version references are in sync
        run: ./scripts/check_version_sync.sh

      - name: Validate upgrade script completeness
        run: |
          # Auto-discovers all upgrade steps from sql/pg_trickle--X--Y.sql files.
          # Fails if the chain doesn't reach the current Cargo.toml version.
          current_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          pairs=()
          for f in sql/pg_trickle--*--*.sql; do
            base=$(basename "$f" .sql)
            from=${base#pg_trickle--}
            to=${from#*--}
            from=${from%%--*}
            pairs+=("$from $to")
          done
          last_to=$(printf '%s\n' "${pairs[@]}" | awk '{print $2}' | sort -V | tail -1)
          if [[ "$last_to" != "$current_version" ]]; then
            echo "ERROR: Latest upgrade script target ($last_to) != Cargo.toml ($current_version)"
            exit 1
          fi
          echo "Checking ${#pairs[@]} upgrade step(s) ending at v${current_version}"
          for pair in "${pairs[@]}"; do
            from=${pair%% *}
            to=${pair##* }
            echo "━━━ Checking: ${from} → ${to}"
            scripts/check_upgrade_completeness.sh "$from" "$to"
          done

  # ── Upgrade E2E tests (daily + manual) ─────────────────────────────────
  # True version-to-version upgrade tests: install old version, populate
  # data, run ALTER EXTENSION UPDATE, verify everything works.
  # A prepare job discovers all upgrade pairs from sql/pg_trickle--X--Y.sql
  # files plus the full oldest→current chain, then fans out to a matrix.
  upgrade-e2e-prepare:
    name: Discover upgrade pairs
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      matrix: ${{ steps.pairs.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: pairs
        run: |
          current_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          items='['
          first=true
          for f in sql/pg_trickle--*--*.sql; do
            base=$(basename "$f" .sql)
            from=${base#pg_trickle--}
            to=${from#*--}
            from=${from%%--*}
            if [ "$first" = true ]; then first=false; else items="$items,"; fi
            items="$items{\"from\":\"$from\",\"to\":\"$to\"}"
          done
          # Add full chain: oldest archive → current version
          oldest=$(ls sql/archive/pg_trickle--*.sql | sed 's/.*--\(.*\)\.sql/\1/' | sort -V | head -1)
          if [ "$oldest" != "$current_version" ]; then
            items="$items,{\"from\":\"$oldest\",\"to\":\"$current_version\"}"
          fi
          items="$items]"
          echo "matrix={\"include\":$items}" >> "$GITHUB_OUTPUT"
          echo "Discovered upgrade pairs: $items"

  upgrade-e2e-tests:
    name: Upgrade E2E (${{ matrix.from }} → ${{ matrix.to }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [e2e-tests, upgrade-e2e-prepare]
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.upgrade-e2e-prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Build upgrade E2E Docker image
        run: ./tests/build_e2e_upgrade_image.sh ${{ matrix.from }} ${{ matrix.to }}

      - name: Run upgrade E2E tests
        env:
          PGS_E2E_IMAGE: pg_trickle_upgrade_e2e:latest
          PGS_UPGRADE_FROM: ${{ matrix.from }}
          PGS_UPGRADE_TO: ${{ matrix.to }}
        run: |
          cargo nextest run --profile ci --test e2e_upgrade_tests --run-ignored all

  # ── Benchmark regression gate (PRs targeting main only) ─────────────────
  # Restores the Criterion baseline saved by the main-branch benchmarks job,
  # runs all Criterion benches, then fails if any mean regresses > 10%.
  # Non-fatal on cache miss (first run has no baseline to compare against).
  bench-regression:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    timeout-minutes: 25
    continue-on-error: false
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      # Separate release-mode build cache for bench binaries.
      # Other CI jobs use debug mode, so setup-pgrx's target/ cache never
      # contains target/release artifacts — without this the bench job does a
      # full 15-20 min release compile on every run.  A restore-key prefix
      # allows a partial hit on Cargo.lock changes (recompiles new deps only).
      - name: Cache bench release build artifacts
        uses: actions/cache@v5
        with:
          path: target/release
          key: v3-cargo-bench-release-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v3-cargo-bench-release-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-

      - name: Restore Criterion baseline
        id: restore-baseline
        uses: actions/cache/restore@v5
        with:
          path: target/criterion
          key: criterion-baseline-main
          restore-keys: criterion-baseline-

      - name: Run benchmarks (create new/ data)
        run: ./scripts/run_benchmarks.sh -- --baseline main
        env:
          BENCH_QUICK: "1"

      - name: Check for regressions
        run: |
          python3 scripts/criterion_regression_check.py
        env:
          PGT_BENCH_REGRESSION_THRESHOLD: "0.10"

  # ── Benchmarks (non-blocking, Linux only) ───────────────────────────────
  # Expensive; run on weekly schedule and manual dispatch only.
  # On push to main: saves a Criterion baseline so PRs can compare against it.
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Cache bench release build artifacts
        uses: actions/cache@v5
        with:
          path: target/release
          key: v3-cargo-bench-release-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            v3-cargo-bench-release-${{ runner.os }}-${{ env.ImageOS || 'unknown' }}-

      - name: Restore existing baseline (for comparison output)
        uses: actions/cache/restore@v5
        with:
          path: target/criterion
          key: criterion-baseline-main
          restore-keys: criterion-baseline-

      - name: Run benchmarks and save baseline
        run: ./scripts/run_benchmarks.sh -- --save-baseline main
        env:
          BENCH_QUICK: "1"

      - name: Save Criterion baseline to cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: target/criterion
          key: criterion-baseline-main

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 7
          if-no-files-found: ignore

  # ── DAG benchmark tests — calc/throughput (daily + manual) ───────────────
  # All DAG topology benchmarks excluding parallel-worker variants.
  # 15 tests × ~15 s each ≈ well under 30 min. Non-blocking (continue-on-error).
  dag-bench-calc:
    name: DAG bench (calc/throughput)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
               "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          docker system prune -af

      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Restore Docker image cache (postgres:18.3)
        uses: actions/cache@v5
        id: cache-docker-postgres-dag-calc
        with:
          path: /tmp/docker-images/postgres-18.3.tar
          key: docker-postgres-18.3

      - name: Load or pull postgres:18.3
        run: |
          if [ -f /tmp/docker-images/postgres-18.3.tar ]; then
            docker load --input /tmp/docker-images/postgres-18.3.tar
          else
            docker pull postgres:18.3
            mkdir -p /tmp/docker-images
            docker save postgres:18.3 --output /tmp/docker-images/postgres-18.3.tar
          fi

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Run DAG benchmark tests (calc/throughput)
        run: |
          cargo nextest run --profile ci \
            --test e2e_dag_bench_tests \
            --run-ignored ignored-only \
            -E 'not test(/par[0-9]+/)'

  # ── DAG benchmark tests — parallel workers (daily + manual) ──────────────
  # DAG topology benchmarks with 4–8 parallel background workers.
  # 6 tests × ~12 min each ≈ 72 min serially. Non-blocking (continue-on-error).
  dag-bench-parallel:
    name: DAG bench (parallel workers)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    continue-on-error: true
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
               "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          docker system prune -af

      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Restore Docker image cache (postgres:18.3)
        uses: actions/cache@v5
        id: cache-docker-postgres-dag-par
        with:
          path: /tmp/docker-images/postgres-18.3.tar
          key: docker-postgres-18.3

      - name: Load or pull postgres:18.3
        run: |
          if [ -f /tmp/docker-images/postgres-18.3.tar ]; then
            docker load --input /tmp/docker-images/postgres-18.3.tar
          else
            docker pull postgres:18.3
            mkdir -p /tmp/docker-images
            docker save postgres:18.3 --output /tmp/docker-images/postgres-18.3.tar
          fi

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Run DAG benchmark tests (parallel workers)
        run: |
          cargo nextest run --profile ci \
            --test e2e_dag_bench_tests \
            --run-ignored ignored-only \
            -E 'test(/par[0-9]+/)'

  # ── dbt-pgtrickle integration tests (Linux only) ──────────────────────────
  # Cost-optimized: single job builds the Docker image once, then tests
  # against dbt-core min (1.9) and max (1.10). Intermediate versions are
  # skipped — if both boundary versions pass, the middle ones will too.
  # dbt-postgres 1.11 does not exist; 1.10 is the latest paired release.
  # Runs on weekly schedule and manual dispatch only (slow Docker build).
  dbt-integration:
    name: dbt integration
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Start PostgreSQL with pg_trickle
        run: |
          docker run -d \
            --name pgtrickle-dbt-test \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 \
            pg_trickle_e2e:latest

          # Wait for PostgreSQL to accept connections
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker exec pgtrickle-dbt-test \
              pg_isready -U postgres -q 2>/dev/null; then
              echo "PostgreSQL is ready (attempt $i)"
              break
            fi
            sleep 1
          done

      - name: Create pg_trickle extension
        run: |
          docker exec pgtrickle-dbt-test \
            psql -U postgres -c "CREATE EXTENSION IF NOT EXISTS pg_trickle;"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Test with dbt 1.9 (minimum supported)
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          pip install "dbt-core~=1.9.0" "dbt-postgres~=1.9.0"
          echo "=== dbt version ==="
          dbt --version
          cd dbt-pgtrickle/integration_tests
          dbt deps
          dbt seed
          dbt run
          ./scripts/wait_for_populated.sh order_totals 30
          dbt test
          dbt run --full-refresh
          ./scripts/wait_for_populated.sh order_totals 30
          dbt test
          dbt run-operation pgtrickle_refresh --args '{model_name: order_totals}'
          dbt run-operation pgtrickle_check_freshness
          dbt run-operation drop_all_stream_tables

      - name: Test with dbt 1.10 (latest supported)
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          pip install "dbt-core~=1.10.0" "dbt-postgres~=1.10.0"
          echo "=== dbt version ==="
          dbt --version
          cd dbt-pgtrickle/integration_tests
          dbt deps
          dbt seed
          dbt run
          ./scripts/wait_for_populated.sh order_totals 30
          dbt test
          dbt run --full-refresh
          ./scripts/wait_for_populated.sh order_totals 30
          dbt test
          dbt run-operation pgtrickle_refresh --args '{model_name: order_totals}'
          dbt run-operation pgtrickle_check_freshness
          dbt run-operation drop_all_stream_tables

      - name: Cleanup
        if: always()
        run: docker rm -f pgtrickle-dbt-test 2>/dev/null || true

  # ── dbt Getting Started example (Linux only) ─────────────────────────────
  # Validates the examples/dbt_getting_started/ project against the E2E image.
  # Runs on push-to-main, weekly schedule, and manual dispatch only.
  dbt-getting-started:
    name: dbt getting-started example
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Start PostgreSQL with pg_trickle
        run: |
          docker run -d \
            --name pgtrickle-getting-started \
            -e POSTGRES_PASSWORD=postgres \
            -p 15433:5432 \
            pg_trickle_e2e:latest

          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker exec pgtrickle-getting-started \
              pg_isready -U postgres -q 2>/dev/null; then
              echo "PostgreSQL is ready (attempt $i)"
              break
            fi
            sleep 1
          done

      - name: Create pg_trickle extension
        run: |
          docker exec pgtrickle-getting-started \
            psql -U postgres -c "CREATE EXTENSION IF NOT EXISTS pg_trickle;"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run Getting Started example (dbt 1.10)
        env:
          PGHOST: localhost
          PGPORT: '15433'
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          pip install "dbt-core~=1.10.0" "dbt-postgres~=1.10.0"
          echo "=== dbt version ==="
          dbt --version
          cd examples/dbt_getting_started
          dbt deps
          dbt seed
          dbt run
          ./scripts/wait_for_populated.sh public.department_tree 30
          ./scripts/wait_for_populated.sh public.department_stats 30
          ./scripts/wait_for_populated.sh public.department_report 30
          dbt test

      - name: Cleanup
        if: always()
        run: docker rm -f pgtrickle-getting-started 2>/dev/null || true

  # ── CloudNativePG smoke test (non-blocking, Linux only) ─────────────────
  # Runs on weekly schedule and manual dispatch only (requires kind cluster).
  #
  # Uses a transitional approach: builds the scratch-based extension image
  # (cnpg/Dockerfile.ext-build), then creates a composite image combining
  # the extension with postgres:18.3 for the smoke test. This validates
  # that the extension image layout is correct and the extension works.
  #
  # Once kind supports Kubernetes 1.33 with ImageVolume feature gate, this
  # should be updated to use .spec.postgresql.extensions directly with the
  # official CNPG operand image.
  cnpg-smoke-test:
    name: CNPG smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: cnpg-test

      - name: Build extension image (scratch-based)
        run: |
          docker build -t pg_trickle-ext:ci \
            -f cnpg/Dockerfile.ext-build .

      - name: Verify extension image layout
        run: |
          ID=$(docker create pg_trickle-ext:ci true)
          mkdir -p /tmp/ext-verify
          docker cp "$ID:/lib/" /tmp/ext-verify/lib/
          docker cp "$ID:/share/" /tmp/ext-verify/share/
          docker rm "$ID"

          echo "=== Extension image contents ==="
          find /tmp/ext-verify -type f
          echo "==============================="

          test -f /tmp/ext-verify/lib/pg_trickle.so
          test -f /tmp/ext-verify/share/extension/pg_trickle.control
          ls /tmp/ext-verify/share/extension/pg_trickle--*.sql

          echo "Extension image layout OK"

      - name: Build composite image for smoke test
        run: |
          # Transitional: combine extension image with postgres:18.3
          # until kind supports K8s 1.33 ImageVolume feature gate.
          # This image is NOT shipped — only used for CI validation.
          #
          # CNPG runs containers as UID 26 (postgres in RHEL/CNPG operand
          # images). The Docker Hub postgres:18.3 image uses UID 999.
          # Remap so initdb (which CNPG runs as UID 26) can resolve its
          # user identity from /etc/passwd.
          cat > /tmp/Dockerfile.cnpg-smoke <<'DOCKERFILE'
          FROM pg_trickle-ext:ci AS ext
          FROM postgres:18.3
          RUN sed -i 's/^postgres:x:999:999:/postgres:x:26:26:/' /etc/passwd && \
              sed -i 's/^postgres:x:999:/postgres:x:26:/' /etc/group && \
              chown -R 26:26 /var/lib/postgresql /var/run/postgresql
          COPY --from=ext /lib/ /usr/lib/postgresql/18/lib/
          COPY --from=ext /share/extension/ /usr/share/postgresql/18/extension/
          DOCKERFILE

          docker build -t pg_trickle:18.3 -f /tmp/Dockerfile.cnpg-smoke .

      - name: Load image into kind
        run: kind load docker-image pg_trickle:18.3 --name cnpg-test

      - name: Install CNPG operator
        run: |
          kubectl apply --server-side -f \
            https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.0.yaml
          kubectl wait --for=condition=Available \
            deployment/cnpg-controller-manager \
            -n cnpg-system \
            --timeout=120s

      - name: Deploy cluster with extension
        run: |
          # Use an inline CI-specific manifest.
          # imagePullPolicy: Never is required for kind-loaded images.
          #
          # Do NOT put shared_preload_libraries here: CNPG propagates
          # postgresql.conf (incl. shared_preload_libraries) into the
          # initdb container's temporary PostgreSQL start. If _PG_init()
          # has any issue in that early phase the initdb pod crashes.
          # Our _PG_init() already handles the missing-SPL case: it
          # registers GUCs but skips shmem/bgworker — all DDL/DML still
          # works. Background scheduler is not needed for a smoke test.
          kubectl apply -f - <<'EOF'
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: pg-trickle-demo
          spec:
            instances: 1
            imageName: pg_trickle:18.3
            imagePullPolicy: Never
            bootstrap:
              initdb:
                database: app
                owner: app
            storage:
              size: 1Gi
              storageClass: standard
          EOF

      - name: Wait for cluster primary pod
        run: |
          echo "Waiting for CNPG Cluster to be ready (up to 8 min)..."
          kubectl wait cluster/pg-trickle-demo \
            --for=condition=Ready \
            --timeout=480s || {
              echo "--- Cluster status ---"
              kubectl describe cluster/pg-trickle-demo | tail -40
              echo "--- Pod status ---"
              kubectl get pods -l cnpg.io/cluster=pg-trickle-demo -o wide
              echo "--- Initdb pod logs (most recent) ---"
              FAILED_POD=$(kubectl get pods \
                -l cnpg.io/cluster=pg-trickle-demo \
                --field-selector=status.phase=Failed \
                -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true)
              if [[ -n "$FAILED_POD" ]]; then
                echo "Logs for ${FAILED_POD}:"
                kubectl logs "${FAILED_POD}" --all-containers 2>&1 | tail -60
              fi
              exit 1
            }

          echo "Waiting for primary pod to be Ready (up to 3 min)..."
          kubectl wait pods \
            -l cnpg.io/cluster=pg-trickle-demo,role=primary \
            --for=condition=Ready \
            --timeout=180s

      - name: Run CNPG smoke test
        run: |
          PRIMARY=$(kubectl get pods \
            -l cnpg.io/cluster=pg-trickle-demo \
            -l role=primary \
            -o jsonpath='{.items[0].metadata.name}')

          if [[ -z "$PRIMARY" ]]; then
            echo "ERROR: no primary pod found"
            kubectl get pods -l cnpg.io/cluster=pg-trickle-demo
            exit 1
          fi

          echo "Primary pod: ${PRIMARY}"

          # Run all checks in a SINGLE psql session.
          #
          # Why one session? Without shared_preload_libraries the extension
          # .so is loaded dynamically when CREATE EXTENSION runs. PostgreSQL
          # only registers GUCs (SHOW pg_trickle.*) for the lifetime of the
          # connection that triggered the dynamic load. Separate kubectl exec
          # calls each start a new backend that hasn't loaded the library yet,
          # so SHOW pg_trickle.enabled returns "unrecognized configuration parameter".
          # Consolidating into one session avoids this limitation entirely.
          #
          # Note: heredoc (<<EOF) is avoided here because GitHub Actions YAML
          # parses << as a merge key even inside run: | block scalars,
          # causing a syntax error. Use -c with a multi-line string instead.
          kubectl exec "${PRIMARY}" -- \
            psql -U postgres -d app -v ON_ERROR_STOP=1 -c "
              CREATE EXTENSION pg_trickle;
              SELECT extname, extversion FROM pg_extension WHERE extname = 'pg_trickle';
              SHOW pg_trickle.enabled;
              CREATE TABLE cnpg_test_src (id INT PRIMARY KEY, val TEXT);
              INSERT INTO cnpg_test_src VALUES (1, 'hello');
              SELECT pgtrickle.create_stream_table(
                  'cnpg_test_dt',
                  'SELECT id, val FROM cnpg_test_src',
                  '1m',
                  'FULL'
              );
              SELECT * FROM cnpg_test_dt;
              SELECT pgtrickle.drop_stream_table('cnpg_test_dt');
              DROP TABLE cnpg_test_src;
            "

          echo "CNPG smoke test passed!"
