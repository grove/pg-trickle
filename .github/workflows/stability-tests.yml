# =============================================================================
# Stability Tests — Long-running soak and multi-database isolation tests
#
# Separated from ci.yml because these are heavyweight, non-blocking stability
# tests that don't gate PRs or merges.  They run daily and on manual dispatch.
# =============================================================================
name: Stability Tests

on:
  schedule:
    - cron: '0 3 * * *'  # Daily 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NEXTEST_PROFILE: ci
  PG_VERSION: "18"

jobs:
  # ── G17-SOAK: Long-Running Stability Soak Test ───────────────────────
  soak-test:
    name: Stability soak test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Run soak test (10 min)
        run: SOAK_DURATION_SECS=600 ./scripts/run_e2e_tests.sh --test e2e_soak_tests --run-ignored all --no-capture
        timeout-minutes: 20

  # ── G17-MDB: Multi-Database Scheduler Isolation Test ──────────────────
  mdb-test:
    name: Multi-database isolation test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Run multi-database isolation test
        run: ./scripts/run_e2e_tests.sh --test e2e_mdb_tests --run-ignored all --no-capture

  # ── FEAT-10-01: Citus Chaos Resilience Tests (v0.51.0) ────────────────
  citus-chaos-test:
    name: Citus chaos resilience test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Setup pgrx environment
        uses: ./.github/actions/setup-pgrx

      - name: Spin up Citus chaos cluster
        run: docker compose -f docker/docker-compose.citus.yml up -d --wait
        timeout-minutes: 5

      - name: Build E2E Docker image
        run: ./tests/build_e2e_image.sh

      - name: Run Citus chaos tests (CHAOS-5/6/7)
        env:
          CITUS_COORDINATOR_URL: postgresql://postgres:postgres@localhost:15432/postgres
          CITUS_COORDINATOR_CONTAINER: citus-coordinator
          CITUS_WORKER_0_CONTAINER: citus-worker-0
          CITUS_WORKER_1_CONTAINER: citus-worker-1
          CITUS_WORKER_2_CONTAINER: citus-worker-2
          CITUS_NETWORK: docker_citus_default
        run: cargo test --test e2e_citus_chaos_tests -- --ignored --test-threads=1 --nocapture
        timeout-minutes: 30

      - name: Tear down Citus chaos cluster
        if: always()
        run: docker compose -f docker/docker-compose.citus.yml down -v

  # ── Final gate: fail the run if either job failed ─────────────────────
  check:
    name: Stability gate
    runs-on: ubuntu-latest
    needs: [soak-test, mdb-test, citus-chaos-test]
    if: always()
    steps:
      - name: Fail if any stability job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more stability jobs failed:"
          echo "  soak-test:         ${{ needs.soak-test.result }}"
          echo "  mdb-test:          ${{ needs.mdb-test.result }}"
          echo "  citus-chaos-test:  ${{ needs.citus-chaos-test.result }}"
          exit 1
