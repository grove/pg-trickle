rules:
  - id: rust.spi.run.dynamic-format
    languages:
      - rust
    severity: WARNING
    message: >-
      Dynamic SQL passed to Spi::run() should be reviewed for quoting,
      privilege context, and user-controlled interpolation. Prefer fixed SQL
      with parameters when possible; otherwise ensure identifiers and literals
      are escaped with the repo's quoting helpers.
    patterns:
      - pattern-either:
          - pattern: Spi::run(&format!($FMT, ...))
          - pattern: pgrx::Spi::run(&format!($FMT, ...))

  - id: rust.spi.query.dynamic-format
    languages:
      - rust
    severity: WARNING
    message: >-
      Dynamic SQL passed to SPI query helpers should be reviewed for SQL
      injection risk, quoting discipline, and object-name construction.
    patterns:
      - pattern-either:
          - pattern: Spi::get_one::<$T>(&format!($FMT, ...))
          - pattern: Spi::get_two::<$T1, $T2>(&format!($FMT, ...))
          - pattern: Spi::get_three::<$T1, $T2, $T3>(&format!($FMT, ...))
          - pattern: pgrx::Spi::get_one::<$T>(&format!($FMT, ...))
          - pattern: pgrx::Spi::get_two::<$T1, $T2>(&format!($FMT, ...))
          - pattern: pgrx::Spi::get_three::<$T1, $T2, $T3>(&format!($FMT, ...))

  - id: sql.security-definer.present
    languages:
      - generic
    severity: INFO
    message: >-
      SECURITY DEFINER requires explicit review. Always pin the search path:
      SET search_path = pgtrickle, pg_catalog, pg_temp; — otherwise an
      unprivileged user can pre-create objects in a schema earlier on the path
      and intercept calls made by the privileged function.
    paths:
      include:
        - /src/**
        - /sql/**
      exclude:
        - "**/*.md"
        - /plans/**
        - /docs/**
    pattern-regex: SECURITY\s+DEFINER

  # ── Phase 2: Extension-specific privilege-context rules ─────────────────────

  - id: sql.row-security.disabled
    languages:
      - generic
    severity: WARNING
    message: >-
      SET LOCAL row_security = off disables PostgreSQL row-level security for
      the current transaction. In a SECURITY DEFINER extension context this can
      allow privileged code to bypass per-user RLS policies. Verify the context
      is appropriate and this path is not reachable from an unprivileged caller
      via the extension API.
    paths:
      include:
        - /src/**
        - /sql/**
      exclude:
        - "**/*.md"
        - /plans/**
        - /docs/**
    pattern-regex: 'SET\s+LOCAL\s+row_security\s*=\s*off'

  - id: sql.set-role.present
    languages:
      - generic
    severity: WARNING
    message: >-
      SET ROLE or RESET ROLE modifies the current session role context. In a
      SECURITY DEFINER extension context this can widen or narrow privileges
      unexpectedly. Verify the role transition is intentional, bounded by a
      matching RESET ROLE or transaction boundary, and that the target role is
      the one you intend.
    paths:
      include:
        - /src/**
        - /sql/**
      exclude:
        - "**/*.md"
        - /plans/**
        - /docs/**
    pattern-regex: '(SET\s+ROLE\b|RESET\s+ROLE\b)'

  - id: rust.panic-in-sql-path
    languages:
      - rust
    severity: WARNING
    message: >-
      .unwrap(), .expect(), or panic!() will crash the PostgreSQL backend
      process if reached from a SQL-callable function. Propagate errors via
      Result<T, PgTrickleError> and convert at the API boundary with
      pgrx::error!() or ereport!() instead. If this code path is genuinely
      unreachable, use pgrx::error!("unreachable: ...") so PostgreSQL can
      clean up the session gracefully rather than aborting the backend.
    patterns:
      - pattern-either:
          - pattern: $X.unwrap()
          - pattern: $X.expect($MSG)
          - pattern: panic!(...)
      # Exclude test code — panics in test bodies are expected and do not run
      # inside the PostgreSQL backend process.
      #
      # IMPORTANT: Semgrep's Rust AST does not support matching attribute annotations
      # (#[test], #[cfg(test)]) combined with fn/mod declarations in pattern-not-inside.
      # The reliable approach is to match the *named* test module bodies directly.
      # All test modules in this codebase use the well-known names `tests` or `pg_tests`.
      - pattern-not-inside: |
          mod tests {
            ...
          }
      - pattern-not-inside: |
          mod pg_tests {
            ...
          }
    paths:
      include:
        - /src/**
      exclude:
        # DVM engine is internal computation; not a direct SQL entry point.
        - /src/dvm/**
        # Standalone CLI binary — not loaded into the PostgreSQL process
        - /src/bin/**
