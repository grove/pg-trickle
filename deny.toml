[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
  # Pulled in transitively via sqlx's mysql support; not compiled for this
  # PostgreSQL-only extension build.
  "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
