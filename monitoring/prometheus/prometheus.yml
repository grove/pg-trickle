global:
  scrape_interval: 15s
  evaluation_interval: 60s
  scrape_timeout: 10s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment to send alerts to Alertmanager:
          # - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: pg_trickle
    static_configs:
      - targets: ["postgres-exporter:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "pg_trickle_demo"
