services:
  postgres:
    build:
      context: ..
      dockerfile: demo/Dockerfile.postgres
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: fraud_demo
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./postgres/02_stream_tables.sql:/docker-entrypoint-initdb.d/02_stream_tables.sql:ro
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d fraud_demo"]
      interval: 2s
      timeout: 5s
      retries: 30

  generator:
    build: ./generator
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres/fraud_demo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres/fraud_demo
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
