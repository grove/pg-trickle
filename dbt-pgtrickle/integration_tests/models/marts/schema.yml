version: 2

models:
  - name: order_totals
    description: "Aggregated order totals per customer (stream table)"
    tests:
      - dbt_pgtrickle.stream_table_healthy:
          warn_seconds: 600
    columns:
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
          - unique
      - name: total_amount
        description: "Sum of all order amounts"
        tests:
          - not_null
      - name: order_count
        description: "Number of orders"
        tests:
          - not_null

  - name: order_extremes
    description: "Min/max order amounts per customer (stream table, FULL refresh)"
    tests:
      - dbt_pgtrickle.stream_table_healthy:
          warn_seconds: 600
    columns:
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
          - unique
      - name: max_amount
        description: "Maximum order amount"
        tests:
          - not_null
      - name: min_amount
        description: "Minimum order amount"
        tests:
          - not_null

  - name: customer_stats
    description: "Customer statistics (stream table, used for alter flow testing)"
    tests:
      - dbt_pgtrickle.stream_table_healthy:
          warn_seconds: 600
    columns:
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
          - unique
      - name: total_amount
        description: "Sum of all order amounts"
        tests:
          - not_null
      - name: order_count
        description: "Number of orders"
        tests:
          - not_null
